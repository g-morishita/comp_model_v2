name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pyright src/

  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pytest -m "not stan" --tb=short -q

  test-stan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev --extra stan
      - name: Cache cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-2.35.0-${{ runner.os }}
      - name: Install cmdstan
        run: uv run python -c "import cmdstanpy; cmdstanpy.install_cmdstan(version='2.35.0', overwrite=False)"
      - run: uv run pytest -m "stan" --tb=short -q

